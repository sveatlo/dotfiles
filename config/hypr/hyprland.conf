# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,auto
monitor=eDP-1,highres,auto,1.5


###################
### DEFINITIONS ###
###################

$mainMod = SUPER # Sets "Windows" key as main modifier
$scripts_dir = ~/src/scripts/
$menu = rofi -modi drun -show drun


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox


exec-once = hyprpm reload -n
# exec-once = systemctl --user start hypridle
# exec-once = systemctl --user start hyprpolkitagent
exec-once = uwsm app -- waybar -c ~/.config/waybar/config-hyprland
exec-once = uwsm app -- udiskie
# exec-once = shikane
exec-once = uwsm app -- wl-paste -t text --watch clipman store -P
# exec-once = nm-applet --indicator
# exec-once = /usr/lib/kdeconnectd
exec-once = libinput-gestures
# exec-once = /home/sveatlo/.cargo/bin/hyprsession
exec-once = uwsm app -- element-desktop
exec-once = uwsm app -- thunderbird
exec-once = uwsm app -- firefox
exec-once = uwsm app -- kitty --class bmonitoring -T bpytop --hold bpytop >/dev/null 2>&1

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 20

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = hy3
}

binds {
    allow_workspace_cycles = true
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10

    dim_inactive = true
    dim_strength = 0.3

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}

cursor {
    no_warps = false
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us,sk
    kb_variant = ,qwerty
    kb_model =
    kb_options = grp:win_space_toggle
    kb_rules =

    # 0 - disable
    # 1 - focus follows mouse (hover)
    # 2 - separate mouse/keyboard focus, click changes keyboard focus
    # 3 - separate mouse/keyboard focus
    follow_mouse = 2

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
        tap_button_map = lmr
    }
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

plugin {
  hy3 {
    tabs {
      height = 18 # default 22
      padding = 0 # default: 6
      radius = 0 # default: 6

      text_height = 7
      text_padding = 0

      # active tab bar segment colors
      col.active =  rgba(33ccffee)
      col.active.border =  rgba(70b0c0ff)
      col.active.text =  rgba(ffffffff)

      # focused tab bar segment colors (focused node in unfocused container)
      col.focused =  rgba(606060ff)
      col.focused.border =  rgba(808080ff)
      col.focused.text =  rgba(ffffffff)

      # inactive tab bar segment colors
      col.inactive =  rgba(303030ff)
      col.inactive.border =  rgba(505050ff)
      col.inactive.text =  rgba(ffffffff)

      # urgent tab bar segment colors
      col.urgent =  rgba(ff4f4fff)
      col.urgent.border =  rgba(ff8080ff)
      col.urgent.text =  rgba(ffffffff)

      # if tab backgrounds should be blurred
      # Blur is only visible when the above colors are not opaque.
      blur = false # default: true
    }
  }
}

