##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Ignore maximize requests from apps. You'll probably like this.
windowrule {
  name = ignore-maximize
  match:class = .*

  suppress_event = maximize
}


# Fix some dragging issues with XWayland
windowrule {
  name = xwayland-drag-fix
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0

  no_focus = on
}



# Small centered floating windows
windowrule {
  name = small-centered-popups
  match:class = ^(thunderbird|qalculate-gtk|pavucontrol)$

  float = on
  center = on
  size = (monitor_w*0.2) (monitor_h*0.2)
}



windowrule {
  name = mailspring-workspace
  match:class = Mailspring

  workspace = 1 silent
}

windowrule {
  name = chat-workspace
  match:class = ^(Element|org.gnome.Fractal)$

  workspace = 5 silent
}

windowrule {
  name = monitoring-workspace
  match:class = bmonitoring

  workspace = 20 silent
}

windowrule {
  name = thunderbird-reminder-popup
  match:class = thunderbird
  match:title = .*Reminder

  float = on
  center = on
  size = (monitor_w*0.2) (monitor_h*0.2)
}

windowrule {
  name = firefox-bitwarden-popup
  match:class = firefox
  match:title = (Extension:.*Bitwarden.*)

  float = on
  center = on
}

windowrule {
  name = kdeconnect-popup
  match:class = org.kde.kdeconnect.handler

  float = on
  center = on
}

